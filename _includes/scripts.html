<script type="module" src="{{ base_path }}/assets/js/main.min.js"></script>
<script src="{{ base_path }}/assets/js/oneko.js"></script>
<script>
(function () {
  var mouseX = window.innerWidth  / 2;
  var mouseY = window.innerHeight / 2;

  if ('ontouchstart' in window) {
    document.addEventListener('touchmove', function (e) {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }, { passive: true });
  } else {
    document.addEventListener('mousemove', function (e) { mouseX = e.clientX; mouseY = e.clientY; });
  }

  var _cats = null;

  function _releaseCats() {
    if (_cats) { return; }
    var orange = createCat({
      spriteUrl: '{{ base_path }}/assets/images/oneko-orange.gif',
      targetFn:  function () { return { x: mouseX, y: mouseY }; },
      spawnX: 80,
      spawnY: window.innerHeight - 80
    });
    var black = createCat({
      spriteUrl: '{{ base_path }}/assets/images/oneko-black.gif',
      targetFn:  function () { return orange.position(); },
      spawnX: 20,
      spawnY: window.innerHeight - 40
    });
    _cats = [orange, black];
  }

  function _sendCatsHome() {
    if (!_cats) { return; }
    _cats.forEach(function (c) { c.destroy(); });
    _cats = null;
  }

  function _updateCatBtn() {
    var btn = document.getElementById('cat-toggle-btn');
    if (!btn) { return; }
    var on = !!_cats;
    btn.setAttribute('aria-pressed', String(on));
    btn.style.opacity = on ? '1' : '0.4';
    btn.title = on ? 'Send cats home' : 'Release the cats';
  }

  window.toggleCats = function () {
    if (_cats) {
      _sendCatsHome();
      localStorage.setItem('oneko-cats', 'off');
    } else {
      _releaseCats();
      localStorage.setItem('oneko-cats', 'on');
    }
    _updateCatBtn();
  };

  if (localStorage.getItem('oneko-cats') !== 'off') {
    _releaseCats();
  }
  _updateCatBtn();
}());
</script>

<script>
/* Sidebar theme toggle — mirrors the masthead sun/moon button.
   Works alongside main.min.js setTheme(): writes localStorage so
   setTheme() on the next page load reads the correct preference. */
(function () {
  function _syncThemeIcons(isDark) {
    var mastheadIcon = document.getElementById('theme-icon');
    var sidebarIcon  = document.getElementById('sidebar-theme-icon');
    var cls = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    if (mastheadIcon) mastheadIcon.className = cls;
    if (sidebarIcon)  sidebarIcon.className  = cls;
  }

  window.toggleSiteTheme = function () {
    var html   = document.documentElement;
    var isDark = html.getAttribute('data-theme') === 'dark';
    if (isDark) {
      html.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
    } else {
      html.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
    }
    _syncThemeIcons(!isDark);
  };

  /* Set initial sidebar icon state once DOM is ready */
  document.addEventListener('DOMContentLoaded', function () {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    _syncThemeIcons(isDark);
  });
}());
</script>
